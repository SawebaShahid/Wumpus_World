<!DOCTYPE html>
<html>
<head>
  <title>Wumpus World Agent</title>

  <style>
   body{
  margin:0;
  font-family:Verdana;
  background:#f8fafc;
  color:#1f2937;
  text-align:center;
}

h1{
  margin:15px;
  color:#64748b;
}

/* controls */
.controls{
  margin-bottom:10px;
}

input{
  width:50px;
  padding:4px;
  border-radius:6px;
  border:1px solid #e2e8f0;
  background:white;
  color:#1f2937;
}

button{
  padding:6px 10px;
  margin-left:5px;
  background:#c7d2fe;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:#1e293b;
}

button:hover{
  background:#a5b4fc;
}

/* GRID BOARD */
#board{
  display:inline-block;
  padding:10px;
  background:#ffffff;
  border:1px solid #e5e7eb;
  border-radius:12px;
}

#grid{
  display:grid;
  gap:10px;
}

.tile{
  width:60px;
  height:60px;
  border-radius:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:10px;
  border:1px solid #e5e7eb;
}

/* SOFT PASTEL STATES */
.unknown{
  background:#f1f5f9;
  color:#94a3b8;
}

.safe{
  background:#dcfce7;
  color:#166534;
}

.danger{
  background:#fee2e2;
  color:#991b1b;
}

.agent{
  background:#fef9c3;
  color:#713f12;
  font-weight:bold;
}

/* HUD */
.hud{
  display:flex;
  justify-content:center;
  gap:20px;
  margin:15px;
}

.badge{
  background:#ffffff;
  border:1px solid #e5e7eb;
  padding:8px 12px;
  border-radius:18px;
  font-size:13px;
}

/* LOG */
#log{
  width:90%;
  max-width:500px;
  margin:10px auto;
  text-align:left;
  font-size:12px;
}

.msg{
  background:#ffffff;
  border:1px solid #e5e7eb;
  padding:6px 10px;
  border-radius:10px;
  margin-bottom:6px;
}


  </style>
</head>

<body>

<h1>Wumpus World Agent</h1>

<div class="controls">
  Rows <input id="rows" value="4">
  Cols <input id="cols" value="4">
  <button onclick="start()">Start</button>
  <button onclick="move()">Move</button>
</div>

<div id="board">
  <div id="grid"></div>
</div>

<div class="hud">
  <div class="badge">Steps: <span id="s-steps">0</span></div>
  <div class="badge">Logic Ops: <span id="s-inf">0</span></div>
  <div class="badge">Sensors: <span id="s-perc">—</span></div>
</div>

<div id="log"></div>

<script>
/* SAME LOGIC */
let world, KB = [];
let steps = 0;
let inferenceSteps = 0;
let gameOver = false;

function log(msg){
  const l = document.getElementById("log");
  l.innerHTML += `<div class="msg">${msg}</div>`;
}

function createWorld(r, c){
  let grid = Array.from({length:r}, () => Array.from({length:c}, () => ({pit:false, w:false})));
  function rand(){ return [Math.floor(Math.random()*r), Math.floor(Math.random()*c)] }
  let [px,py] = rand();
  if(px!==0||py!==0) grid[px][py].pit = true;
  let [wx,wy] = rand();
  if(wx!==0||wy!==0) grid[wx][wy].w = true;
  return { grid, agent:{x:0,y:0}, visited:new Set(["0,0"]) };
}

function neighbors(x, y){
  return [[1,0],[-1,0],[0,1],[0,-1]]
    .map(([dx,dy]) => [x+dx, y+dy])
    .filter(([nx,ny]) => world.grid[nx]?.[ny] !== undefined);
}

function addClause(c){
  const key = JSON.stringify([...c].sort());
  if(!KB.some(k => JSON.stringify([...k].sort()) === key)) KB.push(c);
}

function negate(l){ return l.startsWith("¬") ? l.slice(1) : "¬"+l }

function tell(percepts){
  let {x,y} = world.agent;
  let n = neighbors(x, y);

  if(percepts.includes("B")){
    addClause(n.map(([nx,ny]) => `P${nx}${ny}`));
    log(`Breeze at ${x},${y}`);
  } else {
    n.forEach(([nx,ny]) => addClause([`¬P${nx}${ny}`]));
  }

  if(percepts.includes("S")){
    addClause(n.map(([nx,ny]) => `W${nx}${ny}`));
    log(`Stench at ${x},${y}`);
  } else {
    n.forEach(([nx,ny]) => addClause([`¬W${nx}${ny}`]));
  }
}

function resolve(ci, cj){
  let res = [];
  for(let li of ci){
    for(let lj of cj){
      if(li === negate(lj)){
        let newC = [...new Set([...ci.filter(x=>x!==li), ...cj.filter(x=>x!==lj)])];
        res.push(newC);
      }
    }
  }
  return res;
}

function resolution(KB, query){
  let clauses = KB.map(c => [...c]);
  clauses.push([negate(query)]);
  let changed = true, limit = 300;

  while(changed && limit--){
    changed = false;
    let newClauses = [];

    for(let i=0; i<clauses.length; i++){
      for(let j=i+1; j<clauses.length; j++){
        let rs = resolve(clauses[i], clauses[j]);

        for(let r of rs){
          inferenceSteps++;
          if(r.length === 0) return true;
          newClauses.push(r);
        }
      }
    }

    for(let c of newClauses){
      if(!clauses.some(x => JSON.stringify(x.sort()) === JSON.stringify(c.sort()))){
        clauses.push(c);
        changed = true;
      }
    }
  }
  return false;
}

function ASK(q){ return resolution(KB, q) }
function isSafe(x, y){ return !ASK(`P${x}${y}`) && !ASK(`W${x}${y}`) }

function percepts(){
  let {x,y} = world.agent, p = [];
  for(let [nx,ny] of neighbors(x,y)){
    if(world.grid[nx][ny].pit) p.push("B");
    if(world.grid[nx][ny].w) p.push("S");
  }
  return p;
}

function choose(){
  let {x,y} = world.agent;
  for(let [nx,ny] of neighbors(x,y)){
    if(!world.visited.has(`${nx},${ny}`) && isSafe(nx,ny)){
      return {x:nx, y:ny};
    }
  }
  return null;
}

function move(){
  if(gameOver) return;

  let {x,y} = world.agent;
  if(world.grid[x][y].pit || world.grid[x][y].w){
    alert("Game Over");
    gameOver = true;
    return;
  }

  let p = percepts();
  tell(p);

  let next = choose();
  if(!next) return;

  world.agent = next;
  world.visited.add(`${next.x},${next.y}`);
  steps++;

  render(p);
}

function render(p = []){
  const g = document.getElementById("grid");
  g.innerHTML = "";

  let r = world.grid.length, c = world.grid[0].length;
  g.style.gridTemplateColumns = `repeat(${c}, 60px)`;

  for(let i=0; i<r; i++){
    for(let j=0; j<c; j++){
      let d = document.createElement("div");
      d.className = "tile";

      if(world.agent.x===i && world.agent.y===j) d.classList.add("agent");
      else if(world.grid[i][j].pit||world.grid[i][j].w) d.classList.add("danger");
      else if(world.visited.has(`${i},${j}`)) d.classList.add("safe");
      else d.classList.add("unknown");

      d.textContent = `${i},${j}`;
      g.appendChild(d);
    }
  }

  document.getElementById("s-steps").textContent = steps;
  document.getElementById("s-inf").textContent = inferenceSteps;
  document.getElementById("s-perc").textContent = p.join(", ") || "None";
}

function start(){
  let r = +rows.value, c = +cols.value;
  world = createWorld(r, c);
  KB = []; steps = 0; inferenceSteps = 0; gameOver = false;
  document.getElementById("log").innerHTML = "";
  render();
}
</script>

</body>
</html>
